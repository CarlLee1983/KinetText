name: Test

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  bun-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Smoke check CLI entrypoint
        run: bun run start --help

      - name: Smoke check script CLIs
        run: |
          bun run clean --help
          bun run clean-files --help
          bun run audiobook --help
          bun run merge-mp3 --help
          bun run to-mp4 --help
          bun run backup --help
          bun run retry-failed --help
